<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Nothelfer Zentrum Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#1a0a0e 0%,#2d1016 50%,#1a0a0e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,0.4)}
.logo{text-align:center;margin-bottom:36px}
.logo-mark{width:100px;height:auto;margin:0 auto 16px;display:block}
.logo h1{font-size:22px;font-weight:600;letter-spacing:-.3px}
.logo p{color:rgba(255,255,255,0.5);font-size:13px;margin-top:4px}
label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,0.6);margin-bottom:8px;margin-top:20px}
input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:13px 16px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
input:focus{border-color:#C41E3A}
button{width:100%;margin-top:28px;padding:14px;background:linear-gradient(135deg,#C41E3A,#A01830);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.88}
.error{background:rgba(196,30,58,0.15);border:1px solid rgba(196,30,58,0.4);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff6b6b;margin-top:20px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/images/logo-white.png" alt="Nothelfer Zentrum" class="logo-mark">
    <h1>Dashboard</h1>
    <p>Nothelfer Zentrum Admin</p>
  </div>
  <label>Benutzername</label>
  <input type="text" id="username" placeholder="admin" autocomplete="username">
  <label>Passwort</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <div class="error" id="error">Ungültige Anmeldedaten</div>
  <button onclick="login()">Einloggen</button>
</div>
<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const err = document.getElementById('error');
  err.style.display = 'none';
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  if (res.ok) {
    window.location.href = '/dashboard/index.html';
  } else {
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
